<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta name="author" content="{{ site.author }}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:type" content="website" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />

  {% feed_meta %}
</head>
<body>
  <div class="site-wrapper">

    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <div class="site-title">
          <span class="emoji">🌾</span>
          <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </div>
        <nav>
          <ul class="site-nav">
            <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>首页</a></li>
            <li><a href="{{ '/about' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>关于</a></li>
            {% if site.github_username != "" %}
            <li><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a></li>
            {% endif %}
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main content -->
    {{ content }}

    <!-- Footer -->
    <footer class="site-footer">
      <p>
        &copy; {{ site.time | date: "%Y" }} <a href="{{ '/' | relative_url }}">{{ site.author }}</a>
        &nbsp;·&nbsp;
        Powered by <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>
        &nbsp;·&nbsp;
        Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>
      </p>
    </footer>

  </div>
</body>
</html>
